server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection "1; mode=block"                      always;
    add_header Referrer-Policy "strict-origin-when-cross-origin"     always;

    # SPA routing — fall back to index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long-lived cache (Create React App uses content hashes)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html — no-cache so the browser always fetches the latest shell
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Disable access logs for favicon & robots (reduce noise)
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Block hidden files (.git, .env, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}

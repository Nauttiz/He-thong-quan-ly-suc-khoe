name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Type-check · Test · Build · Docker
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup with npm cache ──────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 4. TypeScript type-check (no emit) ───────────────
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── 5. ESLint (read-only, no auto-fix) ───────────────
      - name: Lint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0
        continue-on-error: true   # warn only until lint baseline is clean

      # ── 6. Unit tests ─────────────────────────────────────
      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      # ── 7. Production build ───────────────────────────────
      - name: Build
        run: npm run build
        env:
          REACT_APP_FIREBASE_API_KEY:             ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN:         ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID:          ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET:      ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID:              ${{ secrets.REACT_APP_FIREBASE_APP_ID }}

      # ── 8. Upload build artifact ──────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 7

      # ── 9. Build Docker image (smoke test) ───────────────
      - name: Build Docker image
        run: |
          docker build \
            --build-arg REACT_APP_FIREBASE_API_KEY="${{ secrets.REACT_APP_FIREBASE_API_KEY }}" \
            --build-arg REACT_APP_FIREBASE_AUTH_DOMAIN="${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg REACT_APP_FIREBASE_PROJECT_ID="${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}" \
            --build-arg REACT_APP_FIREBASE_STORAGE_BUCKET="${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg REACT_APP_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg REACT_APP_FIREBASE_APP_ID="${{ secrets.REACT_APP_FIREBASE_APP_ID }}" \
            -t bmi-tracker:ci \
            .
